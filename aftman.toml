# Roblox toolchain pins for running the conformance runtime suite LOCALLY: rojo
# builds the test place from the compiled Luau and lune executes it under TestEZ.
# Install with `aftman install` (or `rokit install`), then run
# `go test ./internal/conformance`. CI does NOT install these — it gates on the
# byte-parity tests, and the runtime suite skips gracefully without rojo/lune.
[tools]
rojo = "rojo-rbx/rojo@7.6.1"
lune = "lune-org/lune@0.10.1"
