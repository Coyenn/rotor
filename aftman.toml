# Roblox toolchain pins for the conformance runtime suite: rojo builds the test
# place from the compiled Luau and lune executes it under TestEZ. Install with
# `aftman install` (or `rokit install`). CI provisions these via
# rojo-rbx/setup-aftman; without them the runtime suite skips gracefully.
[tools]
rojo = "rojo-rbx/rojo@7.6.1"
lune = "lune-org/lune@0.10.1"
