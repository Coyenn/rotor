#:schema ./rotor.schema.json

[assets]
mode = "macro"
paths = ["assets/**/*.png", "assets/**/*.ogg"]

[assets.output]
luau = "src/shared/assets.luau"
types = "src/shared/assets.d.ts"

[assets.creator]
type = "group"
id = 12345

[deploy.environments.dev]
universeId = 111
payments = "free"
[deploy.environments.dev.places.start]
file = "build/game.rbxl"
placeId = 222

[deploy.environments.prod]
universeId = 333
payments = "paid"
icon = "assets/icon.png"
thumbnails = ["assets/thumb1.png", "assets/thumb2.png"]

[deploy.environments.prod.places.start]
file = "build/game.rbxl"
placeId = 444
name = "Start Place"
maxPlayers = 30
versionType = "saved"

[deploy.environments.prod.places.lobby]
file = "build/lobby.rbxl"
placeId = 555

[deploy.environments.prod.experience]
name = "My Game"
description = "The best game"
playability = "public"
[deploy.environments.prod.experience.privateServers]
price = 100

[deploy.environments.prod.badges.winner]
name = "Winner!"
