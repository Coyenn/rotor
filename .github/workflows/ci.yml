name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up rotor toolchain
        uses: ./.github/actions/setup

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l internal cmd tools)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./internal/... ./cmd/... ./tools/...

      - name: Build
        run: go build ./...

      - name: Sidecar tests
        run: node --test test/*.test.js
        working-directory: tools/sidecar

      - name: Test
        run: go test ./... -count=1
        env:
          # The setup action installs testdata/transformers/project, so the
          # real-package transformer test must run here, never skip.
          ROTOR_REQUIRE_TRANSFORMERS_FIXTURE: "1"

  vuln:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        # Reachability-scoped scan of the whole module (rotor + vendored tsgo):
        # fails the build only for advisories on code paths rotor can actually
        # execute.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
