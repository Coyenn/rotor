name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up rotor toolchain
        uses: ./.github/actions/setup

      - name: Verify tag matches internal/version
        run: |
          code_version=$(sed -n 's/^const Version = "\(.*\)"$/\1/p' internal/version/version.go)
          if [ "v${code_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match internal/version/version.go (v${code_version})"
            echo "bump the Version constant before tagging a release"
            exit 1
          fi

      - name: Run tests
        run: go test ./... -count=1
        env:
          # The setup action installs testdata/transformers/project; a release
          # must never ship with the real-package transformer test skipped.
          ROTOR_REQUIRE_TRANSFORMERS_FIXTURE: "1"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
