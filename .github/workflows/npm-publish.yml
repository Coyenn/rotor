name: npm-publish

# Publishes the @rotor-rbx/rotor npm package (the binary-downloading shim,
# not the Go sources — see package.json "files"). Triggers on v* tag pushes
# (NOT on release-published: GoReleaser creates releases with GITHUB_TOKEN,
# and token-created events never trigger workflows) or manually via
# workflow_dispatch. The NPM_TOKEN secret (npm granular automation token
# with publish rights + 2FA bypass) lives in the `release` environment,
# which the job binds below.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify package version matches the tag
        if: github.ref_type == 'tag'
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "v${pkg_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "package.json version v${pkg_version} != tag ${GITHUB_REF_NAME}; bump package.json in lockstep with internal/version"
            exit 1
          fi

      - name: Run shim tests
        run: node scripts/install.test.js

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
